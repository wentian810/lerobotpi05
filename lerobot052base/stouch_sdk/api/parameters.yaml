# 摄像头参数 windows系统fpc平面款器件
camera_params:
  hue: 0.0           # 色调
  saturation: 64     # 饱和度
  gamma: 100         # 伽玛值
  auto_exposure: 0.0 # 自动曝光
  exposure: -6.0     # 曝光值
  contrast: 32       # 对比度
  brightness: 0      # 亮度
  sharpness: 0       # 锐度
  auto_wb: 0.0       # 自动白平衡
  white_balance_blue: 2800 # 白平衡色温

