# Farneback光流参数
params:
  pyr_scale: 0.5     # 图像金字塔缩放比例
  levels: 4          # 金字塔级别数
  winsize: 61        # 搜索窗口大小
  iterations: 7      # 迭代次数
  poly_n: 7          # 多项式邻域大小
  poly_sigma: 1.1    # 多项式标准差
  flags: 4           # cv2.OPTFLOW_USE_INITIAL_FLOW  # 标志

# 单元格大小
cell_size: 1

# 步长
optical_flow_step: 35

# 压力缩放系数
pressure_scale: 4

# 压力图显示模式（0=灰度，1=彩色，2=3D指尖视图，3=3D点云视图）
pressure_form_switch: 2.0
display_angle: -1

scale_factor: 0.5

# 默认端口号
usb_id: 2

# ROI区域 (640x480分辨率)
roi_x1: 153
roi_x2: 493
roi_y1: 60
roi_y2: 411

# 触摸状态阈值
contact_threshold: 10.0
release_threshold: 8.0
slide_threshold: 1.0
slide_force_std_threshold: 0.2

# 3D压力函数图缩放系数
fx_scale: 0.1
fy_scale: 0.1
fz_scale: 0.05

# 摄像头参数 windows系统平面款器件
